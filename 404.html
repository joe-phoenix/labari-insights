<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Labari Insights</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Stores the path and redirects to index.html which React Router picks up
      var path = window.location.pathname;
      var query = window.location.search;
      var hash = window.location.hash;
      var base = '/labari-insights';
      var rest = path.replace(base, '') || '/';
      sessionStorage.setItem('redirect', rest + query + hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
